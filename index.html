<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport: critical for mobile performance -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary SEO -->
    <title>LoopChat – AI-Powered Real-Time Chat App | Connect Globally</title>
    <meta name="description" content="LoopChat is the most advanced AI-powered real-time chat platform. Chat with strangers, make friends, enjoy AI smart replies, and connect globally. Free forever." />
    <meta name="keywords" content="loopchat, ai chat app, real-time chat, random chat, talk to strangers, omegle alternative, discord alternative, free chat, websocket chat, ai chatbot" />
    <meta name="author" content="LoopChat" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://loopchat.app/" />

    <!-- Performance: DNS prefetch & preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.dicebear.com" />

    <!-- Theme Color (Mobile browser URL bar) -->
    <meta name="theme-color" content="#7c3aed" />
    <meta name="msapplication-TileColor" content="#7c3aed" />

    <!-- PWA / Mobile App -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LoopChat" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/assets/logo.png" />
    <link rel="apple-touch-icon" href="/assets/logo.png" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://loopchat.app/" />
    <meta property="og:title" content="LoopChat – AI-Powered Real-Time Chat App" />
    <meta property="og:description" content="Free AI-powered chat platform. Talk to strangers, make friends, and connect with people worldwide using real-time AI smart replies." />
    <meta property="og:image" content="/assets/logo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="LoopChat" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@loopchat" />
    <meta name="twitter:title" content="LoopChat – AI-Powered Real-Time Chat App" />
    <meta name="twitter:description" content="The most modern AI chat platform. Real-time WebSocket, smart replies, zero lag, mobile-first." />
    <meta name="twitter:image" content="/assets/logo.png" />

    <!-- Schema.org JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "LoopChat",
      "applicationCategory": "CommunicationApplication",
      "operatingSystem": "Web, iOS, Android",
      "url": "https://loopchat.app",
      "description": "AI-powered real-time chat platform for connecting with people globally. Features smart replies, sentiment analysis, and WebSocket real-time messaging.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "1240"
      }
    }
    </script>

    <!-- 🔥 MASTER Global Polyfills: Fixes 'crypto undefined', 'global', and 'getRandomValues' in prod -->
    <script>
      if (typeof global === 'undefined') { window.global = window; }
      if (typeof window !== 'undefined') {
        if (!window.crypto) {
          window.crypto = window.msCrypto || {
            getRandomValues: (arr) => {
              for (let i = 0; i < arr.length; i++) arr[i] = Math.floor(Math.random() * 256);
              return arr;
            }
          };
        }
        if (window.crypto && !window.crypto.subtle) {
          window.crypto.subtle = window.crypto.webkitSubtle || {};
        }
      }
    </script>
  </head>
  <body>
    <!-- ARIA live region for screen readers -->
    <div id="root" role="main" aria-label="LoopChat Application"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
